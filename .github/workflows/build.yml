name: Build Portable EXE
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pymupdf pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "PDF_Comparator_Pro" src/main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Portable-EXE
          path: dist/PDF_Comparator_Pro.exe
